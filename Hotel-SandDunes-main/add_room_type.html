{% extends "base.html" %}

{% block title %}Add Room Type{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Add New Room Type</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_room_type') }}">
                        <div class="mb-3">
                            <label for="type_name" class="form-label">Room Type Name</label>
                            <input type="text" class="form-control" id="type_name" name="type_name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="base_price" class="form-label">Base Price per Night ($)</label>
                            <input type="number" class="form-control" id="base_price" name="base_price" min="0" step="0.01" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="capacity" class="form-label">Capacity (persons)</label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="amenities" class="form-label">Amenities</label>
                            <textarea class="form-control" id="amenities" name="amenities" rows="2" required></textarea>
                            <div class="form-text">Enter amenities separated by commas (e.g., WiFi, TV, AC, Mini Bar)</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="num_rooms" class="form-label">Number of Rooms</label>
                            <input type="number" class="form-control" id="num_rooms" name="num_rooms" min="1" required>
                            <div class="form-text">This will create the specified number of rooms of this type</div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Add Room Type</button>
                            <a href="{{ url_for('room_types') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
